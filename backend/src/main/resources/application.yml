server:
  port: 8080

spring:
  datasource:
    url: jdbc:oracle:thin:@//localhost:1521/ORCLPDB1
    username: tool_admin
    password: ${ORACLE_PASSWORD:changeme}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

erp:
  base-url: ${ERP_BASE_URL:http://erp.internal.local/api}
  procurement-endpoint: /procurement/requests
  api-key: ${ERP_API_KEY:erp-api-key-placeholder}

tool:
  health:
    warning-threshold: 20
